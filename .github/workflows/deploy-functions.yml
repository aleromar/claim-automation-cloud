name: deploy-functions

on:
  push:
    branches: [main]
    paths: ["backend/**"]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency: deploy-functions

# The suffix is bicep uniqueString() — a deterministic hash of subscription + RG,
# so the name is stable; update only if the app is re-provisioned elsewhere.
env:
  FUNCTIONAPP_NAME: func-claim-automation-f3q5hnwb6i5wk

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6

      # On Linux Consumption with RBAC the functions-action forces
      # WEBSITE_RUN_FROM_PACKAGE and skips the Oryx remote build, so the
      # package must ship its dependencies in .python_packages (the path the
      # Python worker adds to sys.path).
      - name: Vendor dependencies for run-from-package
        working-directory: backend
        run: |
          uv export --frozen --no-dev --no-emit-project -o requirements.txt
          uv pip install --python 3.12 \
            --target .python_packages/lib/site-packages -r requirements.txt

      - uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - uses: Azure/functions-action@bc63708cc6539760eea18d8a7de4ce8ef5fdf593 # v1
        with:
          app-name: ${{ env.FUNCTIONAPP_NAME }}
          package: backend
          respect-funcignore: true

      - name: Smoke — health endpoint
        run: |
          sleep 30
          curl --fail --silent --show-error --retry 5 --retry-delay 15 --retry-all-errors \
            "https://${FUNCTIONAPP_NAME}.azurewebsites.net/api/health"
